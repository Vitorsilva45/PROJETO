<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ficha Ortodôntica</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="container">

    <div class="logo">
         
      <img src="img/logo.png" alt="Logo da Clínica"><h1>Ficha de Ortodôntica</h1>
    
    </div>
    <form action="processo.php" method="POST">

<fieldset>
      <legend>1. Dados Pessoais</legend>

      <div class="form-group">
        <label for="nome">Nome Completo</label>
        <input type="text" id="nome" name="nome" required />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="data_nascimento">Data de Nascimento</label>
          <input type="date" id="data_nascimento" name="data_nascimento" required />
        </div>

        <div class="form-group">
          <label>Sexo</label>
          <div class="radio-group">
            <label>
              <input type="radio" name="sexo" value="Masculino" required />
              Masculino
            </label>
            <label>
              <input type="radio" name="sexo" value="Feminino" />
              Feminino
            </label>
          </div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="cpf">CPF</label>
          <input type="text" id="cpf" name="cpf" required />
        </div>

        <div class="form-group">
          <label for="rg">RG</label>
          <input type="text" id="rg" name="rg" />
        </div>
      </div>
<!-- TELEFONE -->
<div class="form-row">

  <div class="form-group">
    <label for="telefone">Telefone / WhatsApp</label>
    <input type="tel" id="telefone" name="telefone" />
  </div>

  <div class="form-group">
    <label for="profissao">Profissão</label>
    <input type="text" id="profissao" name="profissao" />
  </div>

</div>

<!-- ENDEREÇO + EMAIL -->
<div class="form-row">

  <div class="form-group">
    <label for="endereco">Endereço</label>
    <input type="text" id="endereco" name="endereco" />
  </div>

  <div class="form-group">
    <label for="email">E-mail</label>
    <input type="email" id="email" name="email" />
  </div>

</div>

    </fieldset>

    <!-- QUEIXA PRINCIPAL -->
    <fieldset>
      <legend>2. Queixa Principal</legend>

      <div class="form-group">
        <label for="queixa_principal">Qual o principal motivo da consulta?</label>

        <select id="queixa_principal" name="queixa_principal" required>
          <option value="">Selecione</option>
          <option value="Dentes tortos">Dentes tortos</option>
          <option value="Diastema">Diastema</option>
          <option value="Dor na ATM">Dor na ATM</option>
          <option value="Estética do sorriso">Estética do sorriso</option>
          <option value="Outro">Outro</option>
        </select>
      </div>

      <div class="form-group" id="campo_outro" style="display: none;">
        <label for="outro_motivo">Especifique</label>
        <input type="text" id="outro_motivo" name="outro_motivo" />
      </div>
    </fieldset>

    <!-- HISTÓRICO -->
    <fieldset>
      <legend>3. Histórico Médico</legend>

      <div class="form-group">
        <label>Tem alergia em algum medicamento?</label>

        <div class="radio-group">
          <label>
            <input type="radio" name="tratamento" value="Sim" required />
            Sim
          </label>

          <label>
            <input type="radio" name="tratamento" value="Não" />
            Não
          </label>
        </div>
      </div>
    </fieldset>

    <!-- LGPD -->
    <fieldset>
      <legend>4. Consentimento LGPD</legend>

      <p class="texto-lgpd">
        Autorizo o armazenamento dos meus dados para fins de tratamento clínico e administrativo, conforme a LGPD.
      </p>
      <label class="check-lgpd">
        <input type="checkbox" name="lgpd" required />
        Concordo com os termos.
      </label>
    </fieldset>

    <button type="submit" class="btn">Enviar Cadastro</button>

  </form>
</div>

<!-- JAVASCRIPT para o campo "Outro" -->
<script>
const select = document.getElementById("queixa_principal");
const campoOutro = document.getElementById("campo_outro");
const outroMotivo = document.getElementById("outro_motivo");

select.addEventListener("change", function () {
    if (this.value === "Outro") {
        campoOutro.style.display = "block";
    } else {
        campoOutro.style.display = "none";
        outroMotivo.value = "";
    }
});
</script>

</body>
</html>
