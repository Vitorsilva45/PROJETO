<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ficha Ortodôntica</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="container">

    <div class="logo">
         
      <img src="img/logo.png" alt="Logo da Clínica">
      <h1> Ficha Ortodôntica</h1>
    </div>
    <form action="processo.php" method="POST">

<fieldset>
      <legend>1. Dados Pessoais</legend>

      <div class="form-group">
        <label for="nome">Nome Completo</label>
        <input type="text" id="nome" name="nome" autocomplete="on" required / placeholder="Digite seu nome">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="data_nascimento">Data de Nascimento</label>
          <input type="date" id="data_nascimento" name="data_nascimento" required />
        </div>

        <div class="form-group">
          <label>Sexo</label>
          <div class="radio-group">
            <label>
              <input type="radio" name="sexo" value="Masculino" required />
              Masculino
            </label>
            <label>
              <input type="radio" name="sexo" value="Feminino" required/>
              Feminino
            </label>
          </div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="cpf">CPF</label>
          <input type="text" id="cpf" name="cpf" required / placeholder="000.000.000-00">
        </div>

        <div class="form-group">
          <label for="rg">RG</label>
          <input type="text" id="rg" name="rg" required/ placeholder="000.000.000-00">
        </div>
      </div>

<div class="form-row">

  <div class="form-group">
    <label for="telefone">Telefone / WhatsApp</label>
    <input type="tel" id="telefone" name="telefone"  autocomplete="on" required/ placeholder="(xx) 9xxxx-xxxx">
  </div>

  <div class="form-group">
    <label for="profissao">Profissão</label>
    <input type="text" id="profissao" name="profissao"  autocomplete="on" required placeholder="Digite sua profissao">
  </div>

</div>


<div class="form-row">

  <div class="form-group">
    <label for="endereco">Endereço</label>
    <input type="text" id="endereco" name="endereco"  autocomplete="on" required / placeholder="Digite seu endereço">
  </div>

  <div class="form-group">
    <label for="email">E-mail</label>
    <input type="email" id="email" name="email"  autocomplete="on" required / placeholder="@gmail.com">
  </div>

</div>

    </fieldset>

    
    <fieldset>
      <legend>2. Queixa Principal</legend>

      <div class="form-group">
        <label for="queixa_principal">Qual o principal motivo da consulta?</label>

        <select id="queixa_principal" name="queixa_principal" required>
          <option value="">Selecione</option>
          <option value="Dentes tortos">Dentes tortos</option>
          <option value="Dor de Dentes">Dor de Dentes</option>
          <option value="Dor na ATM">Dor na ATM</option>
          <option value="Estética do sorriso">Estética do sorriso</option>
          <option value="Outro">Outro</option>
        </select>
      </div>
    </fieldset>

    
    <fieldset>
      <legend>3. Histórico Médico</legend>

      <div class="form-group">
        <label>Tem alergia a algum medicamento?</label>
      
        <div class="radio-group">
          <label>
            <input type="radio" name="alergia_medicamento" value="Sim" required />
            Sim
          </label>
      
          <label>
            <input type="radio" name="alergia_medicamento" value="Não" />
            Não
          </label>
        </div>
      </div>
      
      <!-- Campo oculto -->
      <div class="form-group" id="campoAlergia" style="display: none;">
        <label for="qual_alergia">Qual medicamento?</label>
        <input type="text" id="qual_alergia" name="qual_alergia">
      </div>
    </fieldset>

    
    <fieldset>
      <legend>4. Consentimento LGPD</legend>

      <p class="texto-lgpd">
        Autorizo o armazenamento dos meus dados para fins de tratamento clínico e administrativo, conforme a LGPD.
      </p>
      <label class="check-lgpd">
        <input type="checkbox" name="lgpd" required />
        Concordo com os termos.
      </label>
    </fieldset>

    <button type="submit" class="btn">Enviar Cadastro</button>

  </form>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
  
    const radios = document.querySelectorAll(
      'input[name="alergia_medicamento"]'
    );
  
    const campoAlergia = document.getElementById("campoAlergia");
    const inputAlergia = document.getElementById("qual_alergia");
  
    radios.forEach(radio => {
      radio.addEventListener("change", function () {
  
        if (this.value === "Sim") {
          campoAlergia.style.display = "block";
          inputAlergia.required = true;
        } else {
          campoAlergia.style.display = "none";
          inputAlergia.required = false;
          inputAlergia.value = "";
        }
  
      });
    });
  
  });
  </script>


</body>
</html>
